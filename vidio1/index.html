<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <base href="../">
  <title>1번 영상 | 박물관 영상 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-video="videos/video1.mp4">
  <main class="app-shell">
    <section class="screen player-screen" aria-live="polite">
      <div class="video-frame">
        <video id="museumVideo" playsinline preload="metadata">이 브라우저는 영상을 재생할 수 없습니다.</video>
        <p id="videoMessage" class="video-message is-hidden"></p>
      </div>
      <div class="controls" aria-label="영상 조작">
        <button id="playButton" class="control-button" type="button">재생</button>
        <button id="pauseButton" class="control-button" type="button">일시정지</button>
        <button id="restartButton" class="control-button" type="button">처음부터 재생</button>
        <label class="volume-control" for="volumeRange">
          <span>스피커 소리</span>
          <input id="volumeRange" type="range" min="0" max="100" value="80" step="1">
          <output id="volumeValue" for="volumeRange">80%</output>
        </label>
      </div>
    </section>
  </main>
  <script src="player.js"></script>
</body>
</html>
