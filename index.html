<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>박물관 영상 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <!-- 첫 화면: 1~4번 영상 선택 -->
    <section id="menuScreen" class="screen menu-screen" aria-label="영상 선택">
      <h1>영상 선택</h1>
      <div class="video-grid">
        <button class="video-select" data-video="videos/video1.mp4" data-title="1번 영상">1</button>
        <button class="video-select" data-video="videos/video2.mp4" data-title="2번 영상">2</button>
        <button class="video-select" data-video="videos/video3.mp4" data-title="3번 영상">3</button>
        <button class="video-select" data-video="videos/video4.mp4" data-title="4번 영상">4</button>
      </div>
    </section>

    <!-- 영상 선택 후: 돌아가기 버튼 없이 재생 화면만 표시 -->
    <section id="playerScreen" class="screen player-screen is-hidden" aria-live="polite">
      <div class="video-frame">
        <video id="museumVideo" playsinline preload="metadata">
          이 브라우저는 영상을 재생할 수 없습니다.
        </video>
        <p id="videoMessage" class="video-message is-hidden"></p>
      </div>

      <div class="controls" aria-label="영상 조작">
        <button id="playButton" class="control-button" type="button">재생</button>
        <button id="pauseButton" class="control-button" type="button">일시정지</button>
        <button id="restartButton" class="control-button" type="button">처음부터 재생</button>

        <label class="volume-control" for="volumeRange">
          <span>스피커 소리</span>
          <input id="volumeRange" type="range" min="0" max="100" value="80" step="1">
          <output id="volumeValue" for="volumeRange">80%</output>
        </label>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
